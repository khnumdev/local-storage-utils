name: emulator-test

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: dummy-project
          install_components: 'beta'
      - name: Start Datastore Emulator
        run: |
          gcloud beta emulators datastore start --host-port=localhost:8010 --project=dummy-project &
          sleep 10
      - name: Wait for Datastore Emulator to be ready
        run: |
          for i in {1..30}; do
            if nc -z localhost 8010; then
              echo "Datastore emulator is up!"
              break
            fi
            echo "Waiting for emulator... ($i)"
            sleep 1
          done
          if ! nc -z localhost 8010; then
            echo "Emulator did not start in time!" >&2
            exit 1
          fi
      - name: Set environment variables
        run: |
          echo "DATASTORE_EMULATOR_HOST=localhost:8010" >> $GITHUB_ENV
          echo "DATASTORE_PROJECT_ID=dummy-project" >> $GITHUB_ENV
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install package with developer extras so tests and seeding tools are available
          pip install -e .[dev]
      - name: Seed Emulator (with retries)
        run: |
          for i in {1..6}; do
            echo "Seeding emulator (attempt $i)"
            if python scripts/seed_emulator.py; then
              echo "Seed succeeded"
              break
            fi
            echo "Seed failed, retrying..."
            sleep 5
          done
      - name: Run tests (Makefile integration)
        run: |
          make deps
          make integration
