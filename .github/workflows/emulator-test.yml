name: emulator-test

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: dummy-project
          install_components: 'beta'
      - name: Setup Java 21 (Temurin) and netcat
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Install netcat
        run: |
          sudo apt-get update
          sudo apt-get install -y netcat-openbsd
          java -version || true
      - name: Install Datastore emulator component
        run: |
          # Ensure the datastore emulator component is installed in Cloud SDK
          gcloud --quiet components install cloud-datastore-emulator || true
          echo "gcloud components:" && gcloud components list || true

      - name: Start Datastore Emulator
        run: |
          # Start emulator in background and capture logs for debugging
          gcloud beta emulators datastore start --host-port=127.0.0.1:8010 --project=dummy-project > emu.log 2>&1 &
          # Give the emulator a bit more time to initialize before polling
          sleep 15
      - name: Wait for Datastore Emulator to be ready
        run: |
          # Poll for the listening port, printing the last lines of the emulator log each loop for diagnostics
          for i in {1..60}; do
            if nc -z 127.0.0.1 8010; then
              echo "Datastore emulator is up!"
              break
            fi
            echo "Waiting for emulator... ($i)"
            echo "--- emu.log (tail) ---"
            tail -n 100 emu.log || true
            sleep 1
          done
          if ! nc -z 127.0.0.1 8010; then
            echo "Emulator did not start in time!" >&2
            echo "Full emulator log:" >&2
            cat emu.log >&2 || true
            exit 1
          fi
      - name: Set environment variables
        run: |
          echo "DATASTORE_EMULATOR_HOST=localhost:8010" >> $GITHUB_ENV
          echo "DATASTORE_PROJECT_ID=dummy-project" >> $GITHUB_ENV
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install package with developer extras so tests and seeding tools are available
          pip install -e .[dev]
      - name: Seed Emulator (with retries)
        run: |
          for i in {1..6}; do
            echo "Seeding emulator (attempt $i)"
            if python scripts/seed_emulator.py; then
              echo "Seed succeeded"
              break
            fi
            echo "Seed failed, retrying..."
            sleep 5
          done
      - name: Run tests (Makefile integration)
        run: |
          make deps
          make integration
